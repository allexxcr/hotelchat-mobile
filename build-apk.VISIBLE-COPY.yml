name: Build HotelChat Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "lib/**"
      - "tool/**"
      - "pubspec.yaml"
      - "analysis_options.yaml"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: read

concurrency:
  group: hotelchat-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.44.0
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0

      - name: Show build environment
        run: |
          flutter config --no-analytics
          flutter --version
          java -version

      - name: Generate Android project
        shell: bash
        run: |
          cp lib/main.dart /tmp/hotelchat-main.dart
          cp pubspec.yaml /tmp/hotelchat-pubspec.yaml
          cp analysis_options.yaml /tmp/hotelchat-analysis-options.yaml

          rm -rf android test

          flutter create \
            --platforms=android \
            --org online.ognispb \
            --project-name hotelchat_mobile \
            --no-pub \
            .

          cp /tmp/hotelchat-main.dart lib/main.dart
          cp /tmp/hotelchat-pubspec.yaml pubspec.yaml
          cp /tmp/hotelchat-analysis-options.yaml analysis_options.yaml

          rm -rf test
          python3 tool/configure_android.py

          MAIN_ACTIVITY="android/app/src/main/kotlin/online/ognispb/hotelchat/MainActivity.kt"
          test -f "$MAIN_ACTIVITY"
          test "$(head -n 1 "$MAIN_ACTIVITY")" = "package online.ognispb.hotelchat"
          grep -Fxq "import io.flutter.embedding.android.FlutterActivity" "$MAIN_ACTIVITY"
          grep -Fxq "class MainActivity : FlutterActivity()" "$MAIN_ACTIVITY"
          echo "Verified Kotlin entry point:"
          cat "$MAIN_ACTIVITY"

      - name: Clean old build caches
        shell: bash
        run: |
          flutter clean
          rm -rf "$HOME/.gradle/caches"
          rm -rf "$HOME/.gradle/kotlin"

      - name: Install Flutter packages
        run: flutter pub get

      - name: Analyze application source
        run: flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Build universal release APK
        run: |
          flutter build apk \
            --release \
            --build-number "$GITHUB_RUN_NUMBER" \
            --build-name "1.0.$GITHUB_RUN_NUMBER"


      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: HotelChat-Build-Log-${{ github.run_number }}
          path: build-apk.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p release

          APK_NAME="HotelChat-Mobile-${GITHUB_RUN_NUMBER}.apk"

          cp \
            build/app/outputs/flutter-apk/app-release.apk \
            "release/${APK_NAME}"

          (
            cd release
            sha256sum "${APK_NAME}" > "${APK_NAME}.sha256"
          )

          {
            echo "HotelChat Mobile"
            echo "Build: ${GITHUB_RUN_NUMBER}"
            echo "Commit: ${GITHUB_SHA}"
            echo "API: https://ognispb.online"
          } > release/BUILD-INFO.txt

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: HotelChat-Mobile-APK-${{ github.run_number }}
          path: |
            release/*.apk
            release/*.sha256
            release/BUILD-INFO.txt
          if-no-files-found: error
          retention-days: 30
